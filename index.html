<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustainStream - Curated Sustainability News</title>
    <!-- Fonts: Inter for general text, Outfit for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="notebook-binding"></div>
    <div class="content-wrapper">
        <header class="main-header">
            <div class="brand">
                <i class="ph-fill ph-leaf brand-icon"></i>
                <h1>SustainStream</h1>
            </div>
            <div class="header-controls">
                <div class="date-selector" id="archive-nav">
                    <button id="prev-day" aria-label="Previous day"><i class="ph ph-caret-left"></i></button>
                    <span id="current-date-display" class="date-display">Today</span>
                    <button id="next-day" aria-label="Next day" disabled><i class="ph ph-caret-right"></i></button>
                    <button id="calendar-btn" aria-label="Calendar"><i class="ph ph-calendar-blank"></i></button>
                </div>
                <div class="user-greeting">
                    <span>Alpha Team</span>
                    <div class="avatar"><i class="ph ph-user"></i></div>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <section class="hero-section">
                <h2 class="picasso-heading">The Pulse of <br/><span class="highlight-cube">Sustainability</span></h2>
                <p class="subtitle">Your curated executive digest from premium financial and global sources.</p>
            </section>

            <section class="controls-section">
                <div class="filter-group">
                    <span class="filter-label"><i class="ph ph-funnel"></i> Focus Areas:</span>
                    <div class="topic-filters" id="topic-filters">
                        <!-- Filters generated by JS -->
                    </div>
                </div>
            </section>

            <section class="news-feed" id="news-feed">
                <!-- News cards generated by JS -->
            </section>
        </main>
    </div>

    <!-- Calendar Popover Modal -->
    <div id="calendar-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Date</h3>
                <button id="close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Calendar days generated by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
